services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  api:
    image: "nginx:alpine"
    environment:
      ConnectionStrings__key-vault: "${KEY_VAULT_OUTPUTS_VAULTURI}"
      KEY_VAULT_URI: "${KEY_VAULT_OUTPUTS_VAULTURI}"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
